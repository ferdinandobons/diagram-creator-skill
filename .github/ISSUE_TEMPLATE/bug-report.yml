name: Bug Report
description: Report a rendering issue, broken layout, or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please fill out the details below.
  - type: input
    id: topology
    attributes:
      label: Topology
      description: Which topology layout was used?
      placeholder: "e.g., nested, hub-and-spoke, tree"
    validations:
      required: true
  - type: input
    id: theme
    attributes:
      label: Theme
      description: Which theme was used?
      placeholder: "e.g., dark, light, neon"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue clearly
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "e.g., Chrome 120, Safari 17, Firefox 121"
  - type: textarea
    id: input
    attributes:
      label: Input used
      description: Paste the input you gave to the skill (file content, topic, etc.)
